name: Security Scan

on:
  schedule:
    # Weekly, Mondays at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nvd-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          cli: '1.12.0.1479'
      - name: Run OWASP/NVD dependency scan
        # Scans the production classpath; fails on CVSS >= 7.0 (see nvd-config.edn)
        run: clojure -M:nvd "$(clojure -Spath)"
        env:
          NVD_API_TOKEN: ${{ secrets.NVD_API_TOKEN }}
      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nvd-report
          path: target/nvd/
          if-no-files-found: ignore
