name: Security Scan

on:
  schedule:
    # Weekly, Mondays at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nvd-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          cli: '1.12.0.1479'
      - name: Run OWASP/NVD dependency scan
        # Scans the production classpath; fails on CVSS >= 7.0 (see nvd-config.edn)
        run: clojure -M:nvd "$(clojure -Spath)"
        env:
          NVD_API_TOKEN: ${{ secrets.NVD_API_TOKEN }}
      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nvd-report
          path: target/nvd/
          if-no-files-found: ignore
